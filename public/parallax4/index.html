  <title>Interactive illustration, by Zenekezene.</title>
</head>
<body>
  <main class="image-container">
    <section id="wrapper" class="interactive" tabindex="0">
      <canvas
        id="canvas"
        class="canvas"
        width="1300"
        height="1384"
      ></canvas>
      <video id="video" class="video invisible" autoplay muted controls>
        <source src="./video/video.mp4" type="video/mp4" />
      </video>
    </section>
    <div class="loading-screen" id="loading">Wait a moment, please...</div>
    <section class="info">
      <ul class="info__list">
        <li class="only-desktop">Move it with 🐭.</li>
        <li class="only-mobile">Move it with your finger.</li>
        <li class="only-mobile">Move it with the phone or tablet too.</li>
        <li>Share via <a target="_blank" href="https://wa.me/?text=Try this interactive illustration! - https://bike.zenekezene.com/">Whatsapp</a> or <a target="_blank" href="https://twitter.com/intent/tweet?text=Try%20this%20interactive%20illustration,%20by%20Zenekezene!%20-%20https://bike.zenekezene.com">Twitter</a>.</li>
        <li>Follow me on <a href="https://www.instagram.com/zenekezene/">Instagram</a> and <a href="https://twitter.com/zenekezene">Twitter</a>.</li>
      </ul>
      <a href="./images/original.png" target="_blank" download class="button">⬇️ Download wallpaper (2.5 MB)</a>
      <button class="allow-motion-button" onclick="enableMotion()">✨ Enable the magic</button>
    </section>
    <section class="camera" id="video-button">
      <p class="close-video">Close video</p>
      <p class="play-video">HOW WAS IT DRAWN?</p>
      <img src="./images/camera.png" class="camera__icon" />
      <img src="./images/camera-shadow.png" class="camera__shadow" />
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js" integrity="sha512-lIKG1kC5TMb1Zx32vdz1n31YJMZRknVY20U9MJ28hD3y2c0OKN0Ce5NhJji78v8zX5UOSsm+MTBOcJt7yMBnSg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="text/javascript" src="./script.js?v=46"></script>
</body>
</html>
