<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="./styles.css?v=138" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
  <title>Parallax 4</title>
  <style>
    html, body {
      background-color: white;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .image-container {
      margin-top: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    .interactive {
      margin: 0 auto;
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .canvas {
      max-height: 100%;
      max-width: 100%;
      width: auto;
      height: auto;
    }
    .loading-screen {
      background-color: white;
      color: #999;
    }
    .info, .allow-motion-button, .camera { display: none !important; }
    .video { display: none !important; }
  </style>
</head>
<body>
  <main class="image-container demo-mode">
    <section id="wrapper" class="interactive" tabindex="0">
      <canvas
        id="canvas"
        class="canvas"
        width="1300"
        height="1384"
      ></canvas>
      <video id="video" class="video invisible" muted>
        <source src="./video/video.mp4" type="video/mp4" />
      </video>
    </section>
    <div class="loading-screen" id="loading">Loading...</div>
    <section class="camera" id="video-button"></section>
    <button class="allow-motion-button" style="display:none"></button>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js" integrity="sha512-lIKG1kC5TMb1Zx32vdz1n31YJMZRknVY20U9MJ28hD3y2c0OKN0Ce5NhJji78v8zX5UOSsm+MTBOcJt7yMBnSg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="text/javascript" src="./script.js?v=46"></script>
</body>
</html>
