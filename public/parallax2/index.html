<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="author" content="ZenekeZene">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta http-equiv="cache-control" content="no-cache">

  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="./styles.css?v=132" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
  <title>Parallax</title>
</head>
<body>
  <main class="image-container">
    <canvas
      id="canvas"
      class="canvas"
      width="1200"
      height="1600"
    ></canvas>
    <div class="loading-screen" id="loading">Wait a moment, please...</div>
    <button class="allow-motion-button" onclick="enableMotion()">✨ Enable the magic</button>
    <section class="info">
      <ul>
        <li class="only-desktop">Move it with 🐭.</li>
        <li class="only-mobile">Move it with your finger.</li>
        <li class="only-mobile">You can move with the smartphone or tablet too.</li>
        <li>Follow me on <a href="https://www.instagram.com/zenekezene/">Instagram</a> and <a href="https://twitter.com/zenekezene">Twitter</a>.</li>
      </ul>
      <a href="./images/original.png" target="_blank" download class="button">⬇️ Dowload wallpaper (2.4 MB)</a>
    </section>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js" integrity="sha512-lIKG1kC5TMb1Zx32vdz1n31YJMZRknVY20U9MJ28hD3y2c0OKN0Ce5NhJji78v8zX5UOSsm+MTBOcJt7yMBnSg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="text/javascript" src="./script.js?v=45"></script>
</body>
